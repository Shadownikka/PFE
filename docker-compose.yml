version: '3.8'

services:
  # Main NetMind application container
  netmind-core:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: netmind-core
    privileged: true
    network_mode: host
    environment:
      - OLLAMA_HOST=http://localhost:11435
    volumes:
      - .:/app
    stdin_open: true
    tty: true
    depends_on:
      - ai-agent
    restart: unless-stopped

  # Separate AI agent container with Ollama + Llama 3.2
  ai-agent:
    build:
      context: .
      dockerfile: Dockerfile.ai-agent
    container_name: netmind-ai-agent
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: netmind-prometheus
    network_mode: host
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.listen-address=:9091'
    restart: unless-stopped
    depends_on:
      - netmind-core

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: netmind-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ./grafana:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  ollama_data:
  prometheus_data:
  grafana_data:
